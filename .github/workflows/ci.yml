name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  ci:
    name: CI (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
          components: rustfmt, clippy

      - uses: Swatinem/rust-cache@v2

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Lint
        run: cargo clippy --all-targets -- -D warnings

      - name: Run tests
        run: cargo test -- --test-threads=1

      - name: Build docs
        run: cargo doc --no-deps

  security:
    name: Security Audit
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"

      - uses: Swatinem/rust-cache@v2

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit
        run: cargo audit

  release:
    name: Release (${{ matrix.target }})
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [ci, security, version-sync]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - os: ubuntu-latest
            target: x86_64-unknown-linux-musl
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
          - os: ubuntu-latest
            target: aarch64-unknown-linux-musl
          - os: macos-latest
            target: x86_64-apple-darwin
          - os: macos-latest
            target: aarch64-apple-darwin
          - os: windows-latest
            target: x86_64-pc-windows-msvc

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@master
        with:
          toolchain: "1.88.0"
          targets: ${{ matrix.target }}

      - uses: Swatinem/rust-cache@v2

      - name: Install cross-compilation tools
        if: matrix.target == 'aarch64-unknown-linux-gnu'
        run: sudo apt-get update && sudo apt-get install -y gcc-aarch64-linux-gnu

      - name: Install musl tools
        if: contains(matrix.target, 'musl')
        run: sudo apt-get update && sudo apt-get install -y musl-tools

      - name: Install cross for aarch64-musl
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --locked

      - name: Build release binary (cross)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release -p starweft --target ${{ matrix.target }}

      - name: Build release binary (cargo)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release -p starweft --target ${{ matrix.target }}
        env:
          CARGO_TARGET_AARCH64_UNKNOWN_LINUX_GNU_LINKER: aarch64-linux-gnu-gcc

      - name: Package artifact (Unix)
        if: runner.os != 'Windows'
        shell: bash
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME}"
          ARCHIVE="starweft-${VERSION}-${{ matrix.target }}.tar.gz"
          mkdir -p dist
          tar -czf "dist/${ARCHIVE}" -C "target/${{ matrix.target }}/release" starweft
          if command -v sha256sum >/dev/null 2>&1; then
            sha256sum "dist/${ARCHIVE}" > "dist/${ARCHIVE}.sha256"
          else
            shasum -a 256 "dist/${ARCHIVE}" > "dist/${ARCHIVE}.sha256"
          fi

      - name: Package artifact (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $VERSION = $env:GITHUB_REF_NAME
          $ARCHIVE = "starweft-${VERSION}-${{ matrix.target }}.zip"
          New-Item -ItemType Directory -Force -Path dist | Out-Null
          Compress-Archive -Path "target/${{ matrix.target }}/release/starweft.exe" -DestinationPath "dist/${ARCHIVE}"
          $hash = (Get-FileHash "dist/${ARCHIVE}" -Algorithm SHA256).Hash.ToLower()
          "$hash  ${ARCHIVE}" | Out-File -Encoding ascii "dist/${ARCHIVE}.sha256"

      - name: Upload release artifact
        uses: actions/upload-artifact@v4
        with:
          name: starweft-${{ github.ref_name }}-${{ matrix.target }}
          path: dist/*

      - name: Upload to GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*

  version-sync:
    name: Version Sync Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check Cargo.toml and npm/package.json versions match
        run: |
          set -euo pipefail
          CARGO_VERSION=$(python3 -c "import tomllib, pathlib; print(tomllib.loads(pathlib.Path('Cargo.toml').read_text())['workspace']['package']['version'])")
          NPM_VERSION=$(node -p "require('./npm/package.json').version")
          echo "Cargo.toml version: ${CARGO_VERSION}"
          echo "npm/package.json version: ${NPM_VERSION}"
          if [ "${CARGO_VERSION}" != "${NPM_VERSION}" ]; then
            echo "::error::Version mismatch: Cargo.toml=${CARGO_VERSION} npm/package.json=${NPM_VERSION}"
            exit 1
          fi

  npm-publish:
    name: Publish to npm
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'
      - name: Publish npm package
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          cd npm
          npm version "$VERSION" --no-git-tag-version
          npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

  update-homebrew-formula:
    name: Update Homebrew Formula
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [release]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: main

      - name: Compute source tarball SHA256
        id: sha
        run: |
          set -euo pipefail
          VERSION="${GITHUB_REF_NAME#v}"
          TAG="${GITHUB_REF_NAME}"
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${TAG}.tar.gz"
          echo "Downloading source tarball: ${URL}"
          curl -sL -o source.tar.gz "${URL}"
          SHA256=$(sha256sum source.tar.gz | awk '{print $1}')
          echo "sha256=${SHA256}" >> "$GITHUB_OUTPUT"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "url=${URL}" >> "$GITHUB_OUTPUT"
          echo "SHA256: ${SHA256}"

      - name: Update Formula/starweft.rb
        run: |
          set -euo pipefail
          FORMULA="Formula/starweft.rb"
          VERSION="${{ steps.sha.outputs.version }}"
          SHA256="${{ steps.sha.outputs.sha256 }}"
          URL="${{ steps.sha.outputs.url }}"

          sed -i "s|url \".*\"|url \"${URL}\"|" "${FORMULA}"
          sed -i "s|sha256 \".*\"|sha256 \"${SHA256}\"|" "${FORMULA}"

          echo "Updated ${FORMULA}:"
          cat "${FORMULA}"

      - name: Commit updated Formula
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add Formula/starweft.rb
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "formula: update starweft to ${{ steps.sha.outputs.version }}"
            git push origin main
          fi
